{% extends 'base.html' %}
{% block title %}Login — Placement Portal{% endblock %}

{% block content %}
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card p-4">

        <div class="text-center mb-4">
          <i class="bi bi-mortarboard-fill fs-1 text-dark"></i>
          <h4 class="mt-2 fw-bold">Sign In</h4>
          <p class="text-muted small mb-0">Placement Portal</p>
        </div>

        <form method="POST" action="{{ url_for('auth.login') }}">

          <!-- Role -->
          <div class="mb-3">
            <label class="form-label fw-semibold">Login As</label>
            <div class="d-flex gap-2">
              <div class="form-check flex-fill border rounded p-2 text-center">
                <input class="form-check-input" type="radio" name="role" id="roleAdmin" value="admin" required>
                <label class="form-check-label d-block" for="roleAdmin">
                  <i class="bi bi-shield-lock d-block fs-5"></i>Admin
                </label>
              </div>
              <div class="form-check flex-fill border rounded p-2 text-center">
                <input class="form-check-input" type="radio" name="role" id="roleCompany" value="company">
                <label class="form-check-label d-block" for="roleCompany">
                  <i class="bi bi-building d-block fs-5"></i>Company
                </label>
              </div>
              <div class="form-check flex-fill border rounded p-2 text-center">
                <input class="form-check-input" type="radio" name="role" id="roleStudent" value="student">
                <label class="form-check-label d-block" for="roleStudent">
                  <i class="bi bi-person d-block fs-5"></i>Student
                </label>
              </div>
            </div>
          </div>

          <div class="mb-3">
            <label for="email" class="form-label fw-semibold">Email</label>
            <input type="email" class="form-control" id="email" name="email"
                   placeholder="you@example.com" required>
          </div>

          <div class="mb-3">
            <label for="password" class="form-label fw-semibold">Password</label>
            <input type="password" class="form-control" id="password" name="password"
                   placeholder="password" required>
          </div>

          <button type="submit" class="btn btn-dark w-100 mt-1">
            <i class="bi bi-box-arrow-in-right me-1"></i>Login
          </button>
        </form>

        <hr class="my-3">
        <p class="text-center text-muted small mb-1">
          New student? <a href="{{ url_for('auth.register_student') }}">Register here</a>
        </p>
        <p class="text-center text-muted small mb-0">
          New company? <a href="{{ url_for('auth.register_company') }}">Register here</a>
        </p>

      </div>
    </div>
  </div>
</div>
{% endblock %}
