{% extends 'base.html' %}
{% block title %}Post New Drive{% endblock %}

{% block content %}
<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h4 class="fw-bold mb-0">
            <i class="bi bi-briefcase-fill me-2"></i>Post New Drive
          </h4>
          <a href="{{ url_for('company.dashboard') }}"
             class="btn btn-sm btn-outline-secondary">← Dashboard</a>
        </div>

        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-semibold">
              Job Title <span class="text-danger">*</span>
            </label>
            <input type="text" class="form-control" name="job_title" required>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">
              Job Description <span class="text-danger">*</span>
            </label>
            <textarea class="form-control" name="job_description"
                      rows="4" required></textarea>
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold">Eligibility Criteria</label>
              <input type="text" class="form-control" name="eligibility_criteria"
                     placeholder="e.g. CGPA >= 7.0, CSE/IT only">
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold">Required Skills</label>
              <input type="text" class="form-control" name="required_skills"
                     placeholder="e.g. Python, SQL, Django">
            </div>
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold">Salary Range</label>
              <input type="text" class="form-control" name="salary_range"
                     placeholder="e.g. 8-12 LPA">
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold">Location</label>
              <input type="text" class="form-control" name="location"
                     placeholder="e.g. Bangalore, Remote">
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">
              Application Deadline <span class="text-danger">*</span>
            </label>
            <input type="date" class="form-control"
                   name="application_deadline" required>
          </div>

          <button type="submit" class="btn btn-dark w-100">
            <i class="bi bi-send me-1"></i>Submit for Admin Approval
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
