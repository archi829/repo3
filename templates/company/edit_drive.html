{% extends 'base.html' %}
{% block title %}Edit Drive{% endblock %}

{% block content %}
<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h4 class="fw-bold mb-0">
            <i class="bi bi-pencil-square me-2"></i>Edit Drive
          </h4>
          <a href="{{ url_for('company.dashboard') }}"
             class="btn btn-sm btn-outline-secondary">← Dashboard</a>
        </div>

        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-semibold">Job Title</label>
            <input type="text" class="form-control"
                   name="job_title" value="{{ drive.job_title }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Job Description</label>
            <textarea class="form-control" name="job_description"
                      rows="4" required>{{ drive.job_description }}</textarea>
          </div>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold">Eligibility Criteria</label>
              <input type="text" class="form-control" name="eligibility_criteria"
                     value="{{ drive.eligibility_criteria or '' }}">
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold">Required Skills</label>
              <input type="text" class="form-control" name="required_skills"
                     value="{{ drive.required_skills or '' }}">
            </div>
          </div>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold">Salary Range</label>
              <input type="text" class="form-control" name="salary_range"
                     value="{{ drive.salary_range or '' }}">
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold">Location</label>
              <input type="text" class="form-control" name="location"
                     value="{{ drive.location or '' }}">
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Application Deadline</label>
            <input type="date" class="form-control"
                   name="application_deadline"
                   value="{{ drive.application_deadline.isoformat()
                             if drive.application_deadline else '' }}"
                   required>
          </div>
          <button type="submit" class="btn btn-dark w-100">
            <i class="bi bi-check-circle me-1"></i>Save Changes
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
