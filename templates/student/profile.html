{% extends 'base.html' %}
{% block title %}My Profile{% endblock %}

{% block content %}
<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-7">
      <div class="card p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h4 class="fw-bold mb-0">
            <i class="bi bi-person-circle me-2"></i>My Profile
          </h4>
          <a href="{{ url_for('student.dashboard') }}"
             class="btn btn-sm btn-outline-secondary">← Dashboard</a>
        </div>

        <form method="POST" enctype="multipart/form-data">
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold">Full Name</label>
              <input type="text" class="form-control"
                     name="full_name" value="{{ student.full_name }}" required>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold">Phone</label>
              <input type="text" class="form-control"
                     name="phone" value="{{ student.phone or '' }}">
            </div>
          </div>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold">CGPA</label>
              <input type="number" class="form-control"
                     name="cgpa" step="0.01" min="0" max="10"
                     value="{{ student.cgpa or '' }}">
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold">Email</label>
              <input type="email" class="form-control"
                     value="{{ student.email }}" disabled>
              <div class="form-text">Email cannot be changed.</div>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Education</label>
            <input type="text" class="form-control"
                   name="education"
                   value="{{ student.education or '' }}"
                   placeholder="e.g. B.Tech CSE, IIT Madras, 2025">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Skills</label>
            <input type="text" class="form-control"
                   name="skills"
                   value="{{ student.skills or '' }}"
                   placeholder="e.g. Python, Flask, SQL">
            <div class="form-text">Comma separated</div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Resume</label>
            {% if student.resume_path %}
            <div class="mb-2 d-flex align-items-center gap-2">
              <i class="bi bi-file-earmark-check text-success me-1"></i>
              <span class="small text-success">Current: {{ student.resume_path }}</span>
              <a href="{{ url_for('student.download_own_resume') }}"
                target="_blank"
                class="btn btn-sm btn-outline-primary">
                <i class="bi bi-eye me-1"></i>View Resume
              </a>
            </div>
          {% endif %}
            <input type="file" class="form-control"
                   name="resume" accept=".pdf,.doc,.docx">
            <div class="form-text">PDF, DOC or DOCX. Max recommended: 2MB.</div>
          </div>

          <button type="submit" class="btn btn-dark w-100">
            <i class="bi bi-check-circle me-1"></i>Save Profile
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
